```yaml id="x3p9qv"
name: MASTER AI TRADING SYSTEM

on:
  schedule:

    # TEMPORARY TEST
    # Runs every 5 minutes ALL DAYS

    - cron: "*/5 * * * *"

  workflow_dispatch:

jobs:
  master-system:

    runs-on: ubuntu-latest

    env:
      TZ: Asia/Kolkata

      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

      CHANNEL_FREE_MAIN: ${{ secrets.CHANNEL_FREE_MAIN }}
      CHANNEL_FREE_SIGNALS: ${{ secrets.CHANNEL_FREE_SIGNALS }}

      CHANNEL_PREMIUM: ${{ secrets.CHANNEL_PREMIUM }}
      CHANNEL_PREMIUM_ELITE: ${{ secrets.CHANNEL_PREMIUM_ELITE }}

      CHANNEL_EDUCATION: ${{ secrets.CHANNEL_EDUCATION }}

      CHANNEL_NIFTY: ${{ secrets.CHANNEL_NIFTY }}
      CHANNEL_BANKNIFTY: ${{ secrets.CHANNEL_BANKNIFTY }}
      CHANNEL_COMMODITY: ${{ secrets.CHANNEL_COMMODITY }}
      CHANNEL_CURRENCY: ${{ secrets.CHANNEL_CURRENCY }}
      CHANNEL_SWING: ${{ secrets.CHANNEL_SWING }}
      CHANNEL_INTRADAY: ${{ secrets.CHANNEL_INTRADAY }}
      CHANNEL_FNO: ${{ secrets.CHANNEL_FNO }}

      RAZORPAY_LINK: ${{ secrets.RAZORPAY_LINK }}

      NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}

      KITE_API_KEY: ${{ secrets.KITE_API_KEY }}
      KITE_API_SECRET: ${{ secrets.KITE_API_SECRET }}
      KITE_ACCESS_TOKEN: ${{ secrets.KITE_ACCESS_TOKEN }}

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytz yfinance pandas numpy requests kiteconnect python-dotenv

      - name: Run Master Scheduler
        run: |
          echo "==================================="
          echo "🚀 MASTER AI SYSTEM STARTED"
          echo "==================================="

          TZ='Asia/Kolkata' date

          python -u master_scheduler.py

          echo "==================================="
          echo "✅ MASTER AI SYSTEM FINISHED"
          echo "==================================="
```
