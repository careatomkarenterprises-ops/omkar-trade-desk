name: Hedge Fund Market Intelligence

on:
  schedule:
    - cron: "15 3 * * 1-5"
    - cron: "30 10 * * 1-5"
    - cron: "30 15 * * 1-5"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run System Health Check
        run: python system_health_check.py

      - name: Run System Controller
        run: python src/scanner/system_controller.py
