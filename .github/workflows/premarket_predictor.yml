name: Pre-Market Predictor

on:
  schedule:
    - cron: '25 3 * * 1-5'   # 8:55 AM IST
  workflow_dispatch:

jobs:
  run-predictor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        run: python run_market_prediction.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHANNEL_FREE_MAIN: ${{ secrets.CHANNEL_FREE_MAIN }}
          CHANNEL_FREE_SIGNALS: ${{ secrets.CHANNEL_FREE_SIGNALS }}
          CHANNEL_PREMIUM: ${{ secrets.CHANNEL_PREMIUM }}
          CHANNEL_PREMIUM_ELITE: ${{ secrets.CHANNEL_PREMIUM_ELITE }}
