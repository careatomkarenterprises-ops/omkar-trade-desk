name: 🏦 Opening Confirmation

on:
  schedule:
    # 9:20 AM IST
    - cron: '50 3 * * 1-5'

  workflow_dispatch:

jobs:
  opening-confirmation:
    name: Run Opening Confirmation
    runs-on: ubuntu-latest

    steps:

      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pytz yfinance pandas numpy

      - name: 🚀 Run Opening Confirmation
        env:
          TZ: Asia/Kolkata
          PYTHONUNBUFFERED: "1"

          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

          CHANNEL_FREE_MAIN: ${{ secrets.CHANNEL_FREE_MAIN }}
          CHANNEL_FREE_SIGNALS: ${{ secrets.CHANNEL_FREE_SIGNALS }}

          CHANNEL_PREMIUM: ${{ secrets.CHANNEL_PREMIUM }}
          CHANNEL_PREMIUM_ELITE: ${{ secrets.CHANNEL_PREMIUM_ELITE }}

        run: |
          echo "========================================"
          echo "🏦 OPENING CONFIRMATION STARTED"
          echo "========================================"

          date

          python -u run_opening_confirmation.py

          echo "========================================"
          echo "✅ OPENING CONFIRMATION FINISHED"
          echo "========================================"
