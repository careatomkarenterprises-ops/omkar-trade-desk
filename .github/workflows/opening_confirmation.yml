name: Opening Confirmation

on:
  schedule:
    - cron: '50 3 * * 1-5'
  workflow_dispatch:

jobs:
  opening-confirmation:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install requests

      - name: Run Opening Confirmation
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHANNEL_FREE_MAIN: ${{ secrets.CHANNEL_FREE_MAIN }}
          CHANNEL_FREE_SIGNALS: ${{ secrets.CHANNEL_FREE_SIGNALS }}
          CHANNEL_PREMIUM: ${{ secrets.CHANNEL_PREMIUM }}
          CHANNEL_PREMIUM_ELITE: ${{ secrets.CHANNEL_PREMIUM_ELITE }}

        run: python run_opening_confirmation.py
