name: 🔥 Pre-Open Scanner

on:
  schedule:
    - cron: '35 3 * * 1-5'

  workflow_dispatch:

jobs:
  scanner:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Dependencies
        run: |
          pip install --upgrade pip
          pip install requests pytz yfinance pandas numpy

      - name: 🚀 Run Pre-Open Scanner
        env:
          TZ: Asia/Kolkata
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHANNEL_FREE_MAIN: ${{ secrets.CHANNEL_FREE_MAIN }}
          CHANNEL_PREMIUM: ${{ secrets.CHANNEL_PREMIUM }}

        run: python -u run_preopen_scanner.py
