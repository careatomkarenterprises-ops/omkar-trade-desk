name: Market Intelligence System

on:
  schedule:
    - cron: "15 3 * * 1-5"   # 8:45 AM IST
    - cron: "45 10 * * 1-5"   # Mid session
    - cron: "45 15 * * 1-5"   # EOD
  workflow_dispatch:

jobs:
  run-engine:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Market Intelligence Engine
        run: python run_market_intelligence.py
