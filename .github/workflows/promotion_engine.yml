name: Daily Conversion Push

on:
  schedule:
    - cron: '0 12 * * 1-5'
  workflow_dispatch:

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify Files
        run: |
          echo "===== ROOT ====="
          ls
          echo "===== SRC ====="
          ls src
          echo "===== MARKETING ====="
          ls src/marketing

      - name: Install Requests
        run: pip install requests

      - name: Run Promotion Engine
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHANNEL_FREE_MAIN: ${{ secrets.CHANNEL_FREE_MAIN }}
          RAZORPAY_LINK: ${{ secrets.RAZORPAY_LINK }}
        run: |
          echo "===== RUNNING PROMOTION ENGINE ====="
          python -u src/marketing/promotion_engine.py
          echo "===== FINISHED ====="
