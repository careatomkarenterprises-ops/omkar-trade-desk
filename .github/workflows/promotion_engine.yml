name: ⚡ Daily Conversion Push

on:
  schedule:
    - cron: '47 15 * * 1-5'
  workflow_dispatch:

jobs:
  conversion:
    name: Run Conversion Campaigns
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pytz python-dotenv
        
      - name: 🚀 Run Conversion Strategy
        env:
          TZ: Asia/Kolkata
          PYTHONUNBUFFERED: "1"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHANNEL_FREE_MAIN: ${{ secrets.CHANNEL_FREE_MAIN }}
        run: python -u src/marketing/promotion_engine.py --mode conversion
