name: Daily Conversion Push

on:
  schedule:
    # 5:30 PM IST (Best engagement after market hours)
    - cron: '0 12 * * 1-5'

  workflow_dispatch:

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify Files
        run: |
          echo "===== ROOT ====="
          ls
          echo "===== SRC ====="
          ls src
          echo "===== MARKETING ====="
          ls src/marketing

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install requests pytz

      - name: Run Promotion Engine
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHANNEL_FREE_MAIN: ${{ secrets.CHANNEL_FREE_MAIN }}
          CHANNEL_EDUCATION: ${{ secrets.CHANNEL_EDUCATION }}
          RAZORPAY_LINK: ${{ secrets.RAZORPAY_LINK }}
          TZ: Asia/Kolkata
        run: |
          echo "===== RUNNING PROMOTION ENGINE ====="
          date
          python -u src/marketing/promotion_engine.py
          echo "===== FINISHED ====="
