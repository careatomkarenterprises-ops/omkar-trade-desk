name: Daily Performance Report

on:
  schedule:
    - cron: '40 10 * * 1-5'   # 4:10 PM IST (safe buffer)
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - run: python src/marketing/promotion_engine.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          RAZORPAY_LINK: ${{ secrets.RAZORPAY_LINK }}
          CHANNEL_FREE_MAIN: ${{ secrets.CHANNEL_FREE_MAIN }}
