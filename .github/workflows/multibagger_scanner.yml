name: Multibagger Scanner (End of Day)

on:
  schedule:
    # 4:00 PM IST (After Indian Market Closing Analysis)
    - cron: '30 10 * * 1-5'

  workflow_dispatch:

jobs:
  multibagger:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install requests yfinance pandas numpy pytz

      - name: Run Multibagger Scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHANNEL_FREE_MAIN: ${{ secrets.CHANNEL_FREE_MAIN }}
          CHANNEL_FREE_SIGNALS: ${{ secrets.CHANNEL_FREE_SIGNALS }}
          CHANNEL_PREMIUM: ${{ secrets.CHANNEL_PREMIUM }}
          CHANNEL_PREMIUM_ELITE: ${{ secrets.CHANNEL_PREMIUM_ELITE }}
          TZ: Asia/Kolkata

        run: |
          echo "===== MULTIBAGGER SCANNER STARTED ====="
          date
          python -u run_multibagger_scanner.py
          echo "===== MULTIBAGGER SCANNER FINISHED ====="
