name: 📊 Multibagger Scanner (End of Day)

on:
  schedule:
    # 06:12 UTC = 11:42 AM IST.
    # Factoring in your consistent 4.5-hour delay, this will execute at 4:12 PM IST.
    - cron: '12 6 * * 1-5'
  workflow_dispatch:

jobs:
  multibagger:
    name: Run Multibagger Scanner
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pytz yfinance pandas numpy python-dotenv kiteconnect

      - name: 🚀 Run Multibagger Scanner
        env:
          TZ: Asia/Kolkata
          PYTHONUNBUFFERED: "1"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHANNEL_FREE_MAIN: ${{ secrets.CHANNEL_FREE_MAIN }}
          CHANNEL_PREMIUM: ${{ secrets.CHANNEL_PREMIUM }}
          KITE_API_KEY: ${{ secrets.KITE_API_KEY }}
          KITE_API_SECRET: ${{ secrets.KITE_API_SECRET }}
          KITE_ACCESS_TOKEN: ${{ secrets.KITE_ACCESS_TOKEN }}
        run: python -u run_multibagger_scanner.py
