name: 🔄 Daily Reset - Cleanup Data

on:
  schedule:
    # 7:45 AM IST → Before NSE pre-open preparation
    - cron: '15 2 * * 1-5'

  workflow_dispatch:

jobs:
  reset:
    name: Reset Daily Data
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytz
      
      - name: Run Daily Reset
        env:
          PYTHONPATH: .
          PYTHONUNBUFFERED: "1"
          TZ: Asia/Kolkata

          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          RAZORPAY_LINK: ${{ secrets.RAZORPAY_LINK }}

          CHANNEL_FREE: ${{ secrets.CHANNEL_FREE }}
          CHANNEL_EDUCATION: ${{ secrets.CHANNEL_EDUCATION }}

        run: |
          echo "===== DAILY RESET STARTED ====="
          date
          python -u -m src.utils.daily_reset
          echo "===== DAILY RESET FINISHED ====="
