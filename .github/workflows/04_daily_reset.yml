name: 🔄 Daily System Reset

on:
  schedule:
    - cron: '04 18 * * 1-5'
  workflow_dispatch:

jobs:
  reset:
    name: Run Reset Operations
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🚀 Execute Structural Daily Clean
        env:
          TZ: Asia/Kolkata
        run: |
          python -u main.py --action reset
