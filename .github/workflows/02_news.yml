name: 📰 News Alerts - Every 30 Minutes

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  news:
    name: Check Market News
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      # FIX: We now cache the entire 'data' folder using a stable key.
      # This ensures 'posted_news.json' and 'daily_post_count.json' persist correctly.
      - name: Persistent Data Cache
        uses: actions/cache@v4
        with:
          path: data/
          key: market-news-cache-v2-${{ runner.os }}-${{ github.workflow }}
          restore-keys: |
            market-news-cache-v2-${{ runner.os }}-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: Fetch News
        env:
          PYTHONPATH: .
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          CHANNEL_EDUCATION: ${{ secrets.CHANNEL_EDUCATION }}
          CHANNEL_PREMIUM: ${{ secrets.CHANNEL_PREMIUM }}
          CHANNEL_NIFTY: ${{ secrets.CHANNEL_NIFTY }}
          CHANNEL_BANKNIFTY: ${{ secrets.CHANNEL_BANKNIFTY }}
          CHANNEL_COMMODITY: ${{ secrets.CHANNEL_COMMODITY }}
          CHANNEL_CURRENCY: ${{ secrets.CHANNEL_CURRENCY }}
          CHANNEL_SWING: ${{ secrets.CHANNEL_SWING }}
          CHANNEL_INTRADAY: ${{ secrets.CHANNEL_INTRADAY }}
          CHANNEL_FNO: ${{ secrets.CHANNEL_FNO }}
        run: |
          python -m src.news.aggregator
