name: 📰 News Alerts - Market Hours

on:
  schedule:
    # Runs at minute 14 of every hour from 4 AM UTC (9:34 AM IST) to 11 AM UTC (4:34 PM IST)
    - cron: '14 4-11 * * 1-5'
  workflow_dispatch:

jobs:
  news-alerts:
    name: Run News Alerts Engine
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pytz yfinance pandas python-dotenv

      - name: 🚀 Run News Aggregator
        env:
          TZ: Asia/Kolkata
          PYTHONUNBUFFERED: "1"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHANNEL_FREE_MAIN: ${{ secrets.CHANNEL_FREE_MAIN }}
        run: python -u src/news/aggregator.py
