name: 📰 News Alerts - Every 30 Minutes

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  news:
    name: Check Market News
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      # ✅ Restore posted news cache from previous runs
      - name: Restore posted news cache
        uses: actions/cache@v4
        with:
          path: data/posted_news.json
          key: posted-news-${{ github.run_id }}
          restore-keys: |
            posted-news-
      
      # ✅ Restore daily post count cache
      - name: Restore daily count cache
        uses: actions/cache@v4
        with:
          path: data/daily_post_count.json
          key: daily-count-${{ github.run_id }}
          restore-keys: |
            daily-count-
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Fetch News
        env:
          PYTHONPATH: .
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          CHANNEL_EDUCATION: ${{ secrets.CHANNEL_EDUCATION }}
          CHANNEL_PREMIUM: ${{ secrets.CHANNEL_PREMIUM }}
          CHANNEL_NIFTY: ${{ secrets.CHANNEL_NIFTY }}
          CHANNEL_BANKNIFTY: ${{ secrets.CHANNEL_BANKNIFTY }}
          CHANNEL_COMMODITY: ${{ secrets.CHANNEL_COMMODITY }}
          CHANNEL_CURRENCY: ${{ secrets.CHANNEL_CURRENCY }}
          CHANNEL_SWING: ${{ secrets.CHANNEL_SWING }}
          CHANNEL_INTRADAY: ${{ secrets.CHANNEL_INTRADAY }}
          CHANNEL_FNO: ${{ secrets.CHANNEL_FNO }}
        run: |
          python -m src.news.aggregator