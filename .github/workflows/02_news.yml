name: 📰 News Alerts - Market Hours

on:
  schedule:
    # RUN 1: The original 4:14 UTC run shifts to 23:44 UTC the previous day.
    # Therefore, days shift from Mon-Fri (1-5) to Sun-Thu (0-4).
    # With your 4.5-hour delay, this executes at 8:44 AM IST.
    - cron: '44 23 * * 0-4'
    
    # RUNS 2-8: The original 5:14 to 11:14 UTC runs shift to 00:44 to 06:44 UTC.
    # These stay on the same day, so days remain Mon-Fri (1-5).
    # With your 4.5-hour delay, these execute hourly from 9:44 AM to 3:44 PM IST.
    - cron: '44 0-6 * * 1-5'
    
  workflow_dispatch:

jobs:
  news-alerts:
    name: Run News Alerts Engine
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pytz yfinance pandas python-dotenv

      - name: 🚀 Run News Aggregator
        env:
          TZ: Asia/Kolkata
          PYTHONUNBUFFERED: "1"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHANNEL_FREE_MAIN: ${{ secrets.CHANNEL_FREE_MAIN }}
        run: python -u src/news/aggregator.py
