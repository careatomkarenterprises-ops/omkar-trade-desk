name: 📰 News Alerts - Market Hours

on:
  schedule:
    # RUN 1: 23:44 UTC = 4:44 AM IST -> Runs at 9:14 AM IST (with 4.5h delay)
    - cron: '44 23 * * 0-4'
    
    # RUNS 2-8: 00:44 to 06:44 UTC -> Runs hourly 10:14 AM to 4:14 PM IST (with 4.5h delay)
    - cron: '44 0-6 * * 1-5'
    
  workflow_dispatch:

jobs:
  news-alerts:
    name: Run News Alerts Engine
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pytz yfinance pandas python-dotenv

      - name: 💾 Manage News Cache
        uses: actions/cache@v4
        with:
          path: data/posted_news.json
          key: news-cache-${{ github.run_id }}
          restore-keys: |
            news-cache-

      - name: 🚀 Run News Aggregator
        env:
          TZ: Asia/Kolkata
          PYTHONUNBUFFERED: "1"
          PYTHONPATH: ${{ github.workspace }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHANNEL_FREE_MAIN: ${{ secrets.CHANNEL_FREE_MAIN }}
          CHANNEL_PREMIUM: ${{ secrets.CHANNEL_PREMIUM }}
        run: python -u src/news/aggregator.py
