name: 📰 News Alerts - Market Hours

on:
  schedule:
    # Every 30 minutes during Indian market-focused hours

    # 8:30 AM IST
    - cron: '0 3 * * 1-5'

    # 9:00 AM IST
    - cron: '30 3 * * 1-5'

    # 9:30 AM IST
    - cron: '0 4 * * 1-5'

    # 10:00 AM IST
    - cron: '30 4 * * 1-5'

    # 10:30 AM IST
    - cron: '0 5 * * 1-5'

    # 11:00 AM IST
    - cron: '30 5 * * 1-5'

    # 11:30 AM IST
    - cron: '0 6 * * 1-5'

    # 12:00 PM IST
    - cron: '30 6 * * 1-5'

    # 12:30 PM IST
    - cron: '0 7 * * 1-5'

    # 1:00 PM IST
    - cron: '30 7 * * 1-5'

    # 1:30 PM IST
    - cron: '0 8 * * 1-5'

    # 2:00 PM IST
    - cron: '30 8 * * 1-5'

    # 2:30 PM IST
    - cron: '0 9 * * 1-5'

    # 3:00 PM IST
    - cron: '30 9 * * 1-5'

    # 3:30 PM IST
    - cron: '0 10 * * 1-5'

    # 4:00 PM IST
    - cron: '30 10 * * 1-5'

    # 5:00 PM IST
    - cron: '30 11 * * 1-5'

  workflow_dispatch:

jobs:
  news:
    name: Check Market News
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Persistent Data Cache
        uses: actions/cache@v4
        with:
          path: data/
          key: market-news-cache-v2-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            market-news-cache-v2-${{ runner.os }}-
      
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytz
      
      - name: Fetch News
        env:
          PYTHONPATH: .
          PYTHONUNBUFFERED: "1"
          TZ: Asia/Kolkata

          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}

          CHANNEL_FREE: ${{ secrets.CHANNEL_FREE }}
          CHANNEL_EDUCATION: ${{ secrets.CHANNEL_EDUCATION }}
          CHANNEL_PREMIUM: ${{ secrets.CHANNEL_PREMIUM }}

          CHANNEL_NIFTY: ${{ secrets.CHANNEL_NIFTY }}
          CHANNEL_BANKNIFTY: ${{ secrets.CHANNEL_BANKNIFTY }}
          CHANNEL_COMMODITY: ${{ secrets.CHANNEL_COMMODITY }}
          CHANNEL_CURRENCY: ${{ secrets.CHANNEL_CURRENCY }}
          CHANNEL_SWING: ${{ secrets.CHANNEL_SWING }}
          CHANNEL_INTRADAY: ${{ secrets.CHANNEL_INTRADAY }}
          CHANNEL_FNO: ${{ secrets.CHANNEL_FNO }}

        run: |
          echo "===== NEWS ENGINE STARTED ====="
          date
          python -u -m src.news.aggregator
          echo "===== NEWS ENGINE FINISHED ====="
