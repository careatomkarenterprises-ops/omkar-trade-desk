name: 📰 News Alerts - Every 15 Minutes

on:
  schedule:
    - cron: '*/15 0-23 * * *'  # Every 15 minutes, 24/7
  workflow_dispatch:

jobs:
  news:
    name: Check Market News
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Fetch News
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: |
          python -m src.news.aggregator
