name: Hedge Fund Market Intelligence

on:
  schedule:
    - cron: '*/15 03-10 * * 1-5' # Runs every 15 mins during market hours
  workflow_dispatch:

jobs:
  run-intelligence:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Omkar Intelligence
        env:
          # CORE AUTH
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          KITE_API_KEY: ${{ secrets.KITE_API_KEY }}
          KITE_ACCESS_TOKEN: ${{ secrets.KITE_ACCESS_TOKEN }}
          ZERODHA_USER_ID: ${{ secrets.ZERODHA_USER_ID }}
          ZERODHA_PASSWORD: ${{ secrets.ZERODHA_PASSWORD }}
          ZERODHA_TOTP_SECRET: ${{ secrets.ZERODHA_TOTP_SECRET }}
          
          # TELEGRAM CHANNELS (Standardized Names)
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CHANNEL_FREE: ${{ secrets.CHANNEL_FREE }}
          CHANNEL_EDUCATION: ${{ secrets.CHANNEL_EDUCATION }}
          CHANNEL_CURRENCY: ${{ secrets.CHANNEL_CURRENCY }}
          CHANNEL_COMMODITY: ${{ secrets.CHANNEL_COMMODITY }}
          CHANNEL_FNO: ${{ secrets.CHANNEL_FNO }}
          CHANNEL_SWING: ${{ secrets.CHANNEL_SWING }}
          CHANNEL_NIFTY: ${{ secrets.CHANNEL_NIFTY }}
          CHANNEL_BANKNIFTY: ${{ secrets.CHANNEL_BANKNIFTY }}
          CHANNEL_PREMIUM: ${{ secrets.CHANNEL_PREMIUM }}
          CHANNEL_INTRADAY: ${{ secrets.CHANNEL_INTRADAY }}
          
          # LOGGING SETTINGS
          PYTHONUNBUFFERED: "1"
        run: python execution_layer.py
