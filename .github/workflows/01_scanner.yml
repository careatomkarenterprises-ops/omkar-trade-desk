name: 🔍 Omkar Scanner - Every 30 Minutes

on:
  schedule:
    # Runs every 30 mins, Mon-Fri, between 9:00 AM and 4:00 PM IST
    # (Note: GitHub uses UTC time, so 3:30 UTC is 9:00 AM IST)
    - cron: '0,30 3-10 * * 1-5' 
  workflow_dispatch: # Allows manual triggers

jobs:
  scan:
    name: Run Market Scanner
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Indian Market Holiday
        id: holiday_check
        run: |
          # Get current date in IST (UTC + 5.5)
          CURRENT_DATE=$(TZ='Asia/Kolkata' date +%Y-%m-%d)
          
          # List of NSE Holidays 2026
          HOLIDAYS="2026-01-26,2026-03-03,2026-03-26,2026-03-31,2026-04-03,2026-04-14,2026-05-01,2026-05-28,2026-06-26,2026-09-14,2026-10-02,2026-10-20,2026-11-10,2026-11-24,2026-12-25"
          
          if [[ $HOLIDAYS =~ $CURRENT_DATE ]]; then
            echo "Today is a Market Holiday ($CURRENT_DATE). Skipping scan."
            echo "is_holiday=true" >> $GITHUB_OUTPUT
          else
            echo "is_holiday=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Python
        if: steps.holiday_check.outputs.is_holiday != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        if: steps.holiday_check.outputs.is_holiday != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scanner
        if: steps.holiday_check.outputs.is_holiday != 'true'
        env:
          PYTHONPATH: .
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ZERODHA_API_KEY: ${{ secrets.ZERODHA_API_KEY }}
          ZERODHA_API_SECRET: ${{ secrets.ZERODHA_API_SECRET }}
          ZERODHA_USER_ID: ${{ secrets.ZERODHA_USER_ID }}
          ZERODHA_PASSWORD: ${{ secrets.ZERODHA_PASSWORD }}
          ZERODHA_TOTP_SECRET: ${{ secrets.ZERODHA_TOTP_SECRET }}
          CHANNEL_PREMIUM: ${{ secrets.CHANNEL_PREMIUM }}
          # Add other channel secrets here if needed
        run: |
          python -m src.scanner.core

      - name: Upload scan logs
        if: always() && steps.holiday_check.outputs.is_holiday != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: scan-logs
          path: data/
          retention-days: 7
