name: 🔍 Omkar Scanner - Every 30 Minutes

on:
  schedule:
    # Market hours: 9:15 AM to 3:30 PM IST (3:45 to 10:00 UTC)
    - cron: '*/30 3-10 * * 1-5'  # Every 30 mins Mon-Fri
  workflow_dispatch:  # Manual trigger

jobs:
  scan:
    name: Run Market Scanner
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          # Yahoo Finance - NO TOKEN NEEDED!
        run: |
          python -m src.scanner.core

- name: Upload scan logs
  uses: actions/upload-artifact@v4  # ← UPDATED to v4
  with:
    name: scan-logs
    path: data/
    retention-days: 7
    if-no-files-found: warn  # ← New optional parameter
