name: 🔍 Omkar Scanner - Multi-Segment Elite

on:
  schedule:
    - cron: '*/30 3-18 * * 1-5' # Every 30 mins, 9:00 AM - 11:30 PM IST
  workflow_dispatch: 

jobs:
  scan:
    name: Execute Multi-Agent Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Omkar Multi-Segment Engine
        env:
          PYTHONPATH: .
          ZERODHA_API_KEY: ${{ secrets.ZERODHA_API_KEY }}
          ZERODHA_API_SECRET: ${{ secrets.ZERODHA_API_SECRET }}
          ZERODHA_USER_ID: ${{ secrets.ZERODHA_USER_ID }}
          ZERODHA_PASSWORD: ${{ secrets.ZERODHA_PASSWORD }}
          ZERODHA_TOTP_SECRET: ${{ secrets.ZERODHA_TOTP_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHANNEL_CURRENCY: ${{ secrets.CHANNEL_CURRENCY }}
          CHANNEL_COMMODITY: ${{ secrets.CHANNEL_COMMODITY }}
          CHANNEL_FNO: ${{ secrets.CHANNEL_FNO }}
          CHANNEL_SWING: ${{ secrets.CHANNEL_SWING }}
          CHANNEL_EDUCATION: ${{ secrets.CHANNEL_EDUCATION }}
        run: |
          echo "🚀 Starting Morning Setup..."
          python -m src.scanner.morning_setup || echo "⚠️ Setup already done or market closed."
          
          echo "📈 Running FnO & Swing Agents..."
          python -m src.scanner.fno_agent || echo "⚠️ FnO Scan Skipped"
          python -m src.scanner.swing_agent || echo "⚠️ Swing Scan Skipped"
          
          echo "💱 Running Currency Agent..."
          python -m src.scanner.currency_agent || echo "⚠️ Currency Scan Skipped"
          
          echo "🪙 Running Commodity Agent..."
          python -m src.scanner.commodity_agent || echo "⚠️ Commodity Scan Skipped"
