name: 🔍 Omkar Scanner - Multi-Segment Elite

on:
  schedule:
    # 08:45 AM IST (03:15 UTC): Morning Setup & Token Mapping
    - cron: '15 3 * * 1-5'
    # Every 30 mins (Mon-Fri) 09:00 AM to 04:00 PM IST: Multi-Agent Scan
    - cron: '0,30 3-10 * * 1-5' 
  workflow_dispatch: # Allows you to trigger it manually for testing

jobs:
  scan:
    name: Execute Multi-Agent Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Indian Market Holiday
        id: holiday_check
        run: |
          # Get current date in IST
          CURRENT_DATE=$(TZ='Asia/Kolkata' date +%Y-%m-%d)
          
          # Official NSE 2026 Holiday List
          HOLIDAYS="2026-01-26,2026-03-03,2026-03-26,2026-03-31,2026-04-03,2026-04-14,2026-05-01,2026-05-28,2026-06-26,2026-09-14,2026-10-02,2026-10-20,2026-11-10,2026-11-24,2026-12-25"
          
          if [[ "false" =~ $CURRENT_DATE ]]; then
            echo "Today is a Market Holiday ($CURRENT_DATE). Skipping core scan."
            echo "is_holiday=true" >> $GITHUB_OUTPUT
          else
            echo "is_holiday=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Python
        if: steps.holiday_check.outputs.is_holiday != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        if: steps.holiday_check.outputs.is_holiday != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Omkar Multi-Segment Engine
        if: steps.holiday_check.outputs.is_holiday != 'true'
        env:
          PYTHONPATH: .
          # Security Credentials
          ZERODHA_API_KEY: ${{ secrets.ZERODHA_API_KEY }}
          ZERODHA_API_SECRET: ${{ secrets.ZERODHA_API_SECRET }}
          ZERODHA_USER_ID: ${{ secrets.ZERODHA_USER_ID }}
          ZERODHA_PASSWORD: ${{ secrets.ZERODHA_PASSWORD }}
          ZERODHA_TOTP_SECRET: ${{ secrets.ZERODHA_TOTP_SECRET }}
          
          # Communication & Routing
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHANNEL_PREMIUM: ${{ secrets.CHANNEL_PREMIUM }}
          CHANNEL_NIFTY: ${{ secrets.CHANNEL_NIFTY }}
          CHANNEL_BANKNIFTY: ${{ secrets.CHANNEL_BANKNIFTY }}
          CHANNEL_FNO: ${{ secrets.CHANNEL_FNO }}
          CHANNEL_SWING: ${{ secrets.CHANNEL_SWING }}
          CHANNEL_CURRENCY: ${{ secrets.CHANNEL_CURRENCY }}
          CHANNEL_COMMODITY: ${{ secrets.CHANNEL_COMMODITY }}
          CHANNEL_EDUCATION: ${{ secrets.CHANNEL_EDUCATION }}
        run: |
          # Step 1: Initialize Tokens & Authentication
          echo "🚀 Initializing Morning Setup..."
          python -m src.scanner.morning_setup
          
          # Step 2: Execute Multi-Segment Agents
          echo "📉 Scanning F&O (Futures & Options)..."
          python -m src.scanner.fno_agent
          
          echo "📈 Scanning Swing Trade Opportunities (VSA)..."
          python -m src.scanner.swing_agent
          
          echo "💱 Scanning Currency (USDINR & Factors)..."
          python -m src.scanner.currency_agent
          
          echo "🪙 Scanning Commodities (MCX)..."
          python -m src.scanner.commodity_agent

      - name: Save Execution Data & History
        if: always() && steps.holiday_check.outputs.is_holiday != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: market-session-data
          path: data/
          retention-days: 3
