name: 🔍 Omkar Scanner - Multi-Segment Elite

on:
  schedule:
    - cron: '*/30 3-18 * * 1-5' # Every 30 mins during market hours
  workflow_dispatch: 

jobs:
  scan:
    name: Execute Omkar Multi-Agent Engine
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install kiteconnect pyotp pandas requests python-dotenv

      - name: Run Multi-Agent Engine
        env:
          PYTHONPATH: .
          ZERODHA_API_KEY: ${{ secrets.ZERODHA_API_KEY }}
          ZERODHA_ACCESS_TOKEN: ${{ secrets.ZERODHA_ACCESS_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHANNEL_CURRENCY: ${{ secrets.CHANNEL_CURRENCY }}
          CHANNEL_FNO: ${{ secrets.CHANNEL_FNO }}
          CHANNEL_EDUCATION: ${{ secrets.CHANNEL_EDUCATION }}
        run: |# ... (keep your env variables)
    run: |
      mkdir -p data
      # Run setup to generate everything needed for the day
      python -m src.scanner.morning_setup
      
      # Run agents - they will now use the data saved in the 'data/' folder
      python -m src.scanner.currency_agent
      python -m src.scanner.edu_news_agent
