name: Real-Time Scanner (Premium)

on:
  schedule:
    - cron: '*/30 4-10 * * 1-5'   # Every 30 min from 4:00 to 10:30 UTC (9:30 AM to 3:30 PM IST)
  workflow_dispatch:               # Allow manual trigger

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Master Scanner (Premium real-time)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          RAZORPAY_LINK: ${{ secrets.RAZORPAY_LINK }}
        run: python src/scanner/master_scanner.py
