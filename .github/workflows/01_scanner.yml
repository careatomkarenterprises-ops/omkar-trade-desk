name: 🔍 Omkar Scanner - Multi-Segment Elite

on:
  schedule:
    - cron: '*/30 3-18 * * 1-5' 
  workflow_dispatch: 

jobs:
  scan:
    name: Execute Multi-Agent Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Omkar Multi-Segment Engine
        env:
          PYTHONPATH: .
          ZERODHA_API_KEY: ${{ secrets.ZERODHA_API_KEY }}
          ZERODHA_API_SECRET: ${{ secrets.ZERODHA_API_SECRET }}
          ZERODHA_USER_ID: ${{ secrets.ZERODHA_USER_ID }}
          ZERODHA_PASSWORD: ${{ secrets.ZERODHA_PASSWORD }}
          ZERODHA_TOTP_SECRET: ${{ secrets.ZERODHA_TOTP_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHANNEL_CURRENCY: ${{ secrets.CHANNEL_CURRENCY }}
          CHANNEL_COMMODITY: ${{ secrets.CHANNEL_COMMODITY }}
          CHANNEL_FNO: ${{ secrets.CHANNEL_FNO }}
          CHANNEL_SWING: ${{ secrets.CHANNEL_SWING }}
          CHANNEL_EDUCATION: ${{ secrets.CHANNEL_EDUCATION }}
        run: |
          # 1. Setup & Auth
          python -m src.scanner.morning_setup || echo "Setup skipped"
          
          # 2. Equity & FNO Desk
          python -m src.scanner.fno_agent || echo "FnO skipped"
          python -m src.scanner.swing_agent || echo "Swing skipped"
          
          # 3. CDS & MCX Desk
          python -m src.scanner.currency_agent || echo "Currency skipped"
          python -m src.scanner.commodity_agent || echo "Commodity skipped"
          
          # 4. Content & Education Desk
          python -m src.scanner.edu_news_agent || echo "Edu skipped"
