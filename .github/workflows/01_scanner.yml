name: Omkar Trade Desk Scanner

on:
  schedule:
    - cron: '*/30 4-10 * * 1-5'   # Every 30 min 9:30 AM – 3:30 PM IST
    - cron: '30 10 * * 1-5'       # End of day report at 4:00 PM IST
  workflow_dispatch:               # Allows manual trigger

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Main scanner – runs on schedule (any schedule event) OR manual trigger
      - name: Run Master Scanner
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHANNEL_FREE_MAIN: ${{ secrets.CHANNEL_FREE_MAIN }}
          CHANNEL_PREMIUM: ${{ secrets.CHANNEL_PREMIUM }}
          CHANNEL_PREMIUM_ELITE: ${{ secrets.CHANNEL_PREMIUM_ELITE }}
        run: python src/scanner/master_scanner.py

      # End of day report – runs only on the specific cron (4:00 PM IST)
      - name: End of Day Report
        if: github.event_name == 'schedule' && github.event.schedule == '30 10 * * 1-5'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHANNEL_FREE_MAIN: ${{ secrets.CHANNEL_FREE_MAIN }}
        run: |
          python -c "
from src.telegram.poster import send_message
send_message('free_main', '📊 *End of Day* – Scanners completed. Check premium channel for real-time patterns tomorrow.')
"
