name: 📢 Marketing Posts - Daily

on:
  schedule:
    - cron: "30 5,8,11 * * 1-5"

  workflow_dispatch:

jobs:
  marketing-engine:

    runs-on: ubuntu-latest

    env:
      TZ: Asia/Kolkata

      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

      CHANNEL_FREE_MAIN: ${{ secrets.CHANNEL_FREE_MAIN }}
      CHANNEL_EDUCATION: ${{ secrets.CHANNEL_EDUCATION }}

      RAZORPAY_LINK: ${{ secrets.RAZORPAY_LINK }}

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Requirements
        run: |
          pip install -r requirements.txt

      - name: Run Marketing Engine
        run: |
          echo "===== MARKETING ENGINE STARTED ====="
          date
          python -u src/marketing/promotion_engine.py
          echo "===== MARKETING ENGINE FINISHED ====="
