name: 📢 Marketing Posts - Daily

on:
  schedule:
    # 11:00 AM IST → Mid-market engagement
    - cron: '30 5 * * 1-5'

    # 2:30 PM IST → Active trading session
    - cron: '00 9 * * 1-5'

    # 5:45 PM IST → Post-market conversion timing
    - cron: '15 12 * * 1-5'

  workflow_dispatch:

jobs:
  marketing:
    name: Post Marketing Content
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytz
      
      - name: Run Marketing Engine
        env:
          PYTHONPATH: .
          TZ: Asia/Kolkata

          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          RAZORPAY_LINK: ${{ secrets.RAZORPAY_LINK }}

          CHANNEL_FREE: ${{ secrets.CHANNEL_FREE }}
          CHANNEL_EDUCATION: ${{ secrets.CHANNEL_EDUCATION }}
          CHANNEL_PREMIUM: ${{ secrets.CHANNEL_PREMIUM }}

          CHANNEL_NIFTY: ${{ secrets.CHANNEL_NIFTY }}
          CHANNEL_BANKNIFTY: ${{ secrets.CHANNEL_BANKNIFTY }}
          CHANNEL_COMMODITY: ${{ secrets.CHANNEL_COMMODITY }}
          CHANNEL_CURRENCY: ${{ secrets.CHANNEL_CURRENCY }}
          CHANNEL_SWING: ${{ secrets.CHANNEL_SWING }}
          CHANNEL_INTRADAY: ${{ secrets.CHANNEL_INTRADAY }}
          CHANNEL_FNO: ${{ secrets.CHANNEL_FNO }}

        run: |
          echo "===== MARKETING ENGINE STARTED ====="
          date
          python -u -m src.marketing.content
          echo "===== MARKETING ENGINE FINISHED ====="
