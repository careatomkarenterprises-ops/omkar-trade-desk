name: 📢 Marketing Posts - Daily

on:
  schedule:
    - cron: '0 4 * * 1-5'  # 9:30 AM IST
    - cron: '0 8 * * 1-5'  # 2:30 PM IST
    - cron: '0 11 * * 1-5' # 5:30 PM IST
  workflow_dispatch:

jobs:
  marketing:
    name: Post Marketing Content
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Post Marketing
        env:
          PYTHONPATH: .
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          RAZORPAY_LINK: ${{ secrets.RAZORPAY_LINK }}
          CHANNEL_EDUCATION: ${{ secrets.CHANNEL_EDUCATION }}
        run: |
          python -m src.marketing.content
