name: Pre-Open Scanner

on:
  schedule:
    # 9:08 AM IST (Best NSE pre-open confirmation timing)
    - cron: '38 3 * * 1-5'

  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install requests pytz

      - name: Run Pre-Open Scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHANNEL_FREE_MAIN: ${{ secrets.CHANNEL_FREE_MAIN }}
          CHANNEL_PREMIUM: ${{ secrets.CHANNEL_PREMIUM }}
          TZ: Asia/Kolkata

        run: |
          echo "===== PRE-OPEN SCANNER STARTED ====="
          date
          python -u run_preopen_scanner.py
          echo "===== PRE-OPEN SCANNER FINISHED ====="
