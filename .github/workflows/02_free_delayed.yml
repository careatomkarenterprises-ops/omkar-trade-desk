name: ⏳ Delayed Free Posts

on:
  schedule:
    - cron: '54 5 * * 1-5'
    - cron: '07 9 * * 1-5'
  workflow_dispatch:

jobs:
  delayed-posts:
    name: Run Delayed Free Processor
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests表格 pytz python-dotenv

      - name: 🚀 Run Delayed Poster Script
        env:
          TZ: Asia/Kolkata
          PYTHONUNBUFFERED: "1"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHANNEL_FREE_MAIN: ${{ secrets.CHANNEL_FREE_MAIN }}
        run: python -u src/scanner/delayed_poster.py
