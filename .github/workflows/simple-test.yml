name: Simple Test - Check Secrets

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check if secrets are available
        env:
          API_KEY: ${{ secrets.ZERODHA_API_KEY }}
          API_SECRET: ${{ secrets.ZERODHA_API_SECRET }}
          REQUEST_TOKEN: ${{ secrets.ZERODHA_REQUEST_TOKEN }}
        run: |
          echo "=== Checking Secrets ==="
          
          if [ -n "$API_KEY" ]; then
            echo "✅ ZERODHA_API_KEY is set (length: ${#API_KEY})"
          else
            echo "❌ ZERODHA_API_KEY is NOT set"
          fi
          
          if [ -n "$API_SECRET" ]; then
            echo "✅ ZERODHA_API_SECRET is set (length: ${#API_SECRET})"
          else
            echo "❌ ZERODHA_API_SECRET is NOT set"
          fi
          
          if [ -n "$REQUEST_TOKEN" ]; then
            echo "✅ ZERODHA_REQUEST_TOKEN is set (length: ${#REQUEST_TOKEN})"
          else
            echo "❌ ZERODHA_REQUEST_TOKEN is NOT set"
          fi
          
          echo ""
          echo "=== Environment Variables ==="
          env | grep -E "ZERODHA|KITE" || echo "No Zerodha env vars found"
